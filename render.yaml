services:
  - type: web
    name: paleozooa-collector
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        value: "8060"
      - key: DB_PATH
        value: /tmp/paleozooa_metrics.db
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
